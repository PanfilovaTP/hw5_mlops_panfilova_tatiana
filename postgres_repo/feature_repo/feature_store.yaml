---
project: hw5_mlops
project_description: >
  Feature Store for homework 5.
  The configuration follows the postgres template from the seminar.

provider: local

registry:
  registry_type: sql
  path: postgresql+psycopg://tuser:12345@127.0.0.1:5433/mydb?sslmode=disable
  cache_ttl_seconds: 60
  sqlalchemy_config_kwargs:
    echo: false
    pool_pre_ping: true

online_store:
  type: postgres
  host: 127.0.0.1
  port: 5433
  database: mydb
  db_schema: public
  user: tuser
  password: "12345"
  sslmode: disable

offline_store:
  type: postgres
  host: 127.0.0.1
  port: 5433
  database: mydb
  db_schema: public
  user: tuser
  password: "12345"
  sslmode: disable

entity_key_serialization_version: 3